app-id: org.flamerobin.FlameRobin
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: flamerobin

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --share=network
  - --talk-name=org.freedesktop.secrets

modules:
  - name: libtommath
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_SHARED_LIBS=ON
    sources:
      - type: archive
        url: https://github.com/libtom/libtommath/releases/download/v1.3.0/ltm-1.3.0.tar.xz
        sha256: 296272d93435991308eb73607600c034b558807a07e829e751142e65ccfa9d08

  - name: firebird-client
    buildsystem: simple
    build-commands:
      # The outer tarball contains buildroot.tar.gz (after strip-components: 1).
      # Extract the Firebird client libraries and headers from the inner buildroot.tar.gz.
      - tar -xzf buildroot.tar.gz ./opt/firebird/lib/libfbclient.so.5.0.4 ./opt/firebird/lib/libib_util.so ./opt/firebird/lib/libtomcrypt.so.1.0.1 ./opt/firebird/include
      - install -Dm755 opt/firebird/lib/libfbclient.so.5.0.4 /app/lib/libfbclient.so.5.0.4
      - ln -sf libfbclient.so.5.0.4 /app/lib/libfbclient.so.2
      - ln -sf libfbclient.so.2 /app/lib/libfbclient.so
      - install -Dm755 opt/firebird/lib/libib_util.so /app/lib/libib_util.so
      - install -Dm755 opt/firebird/lib/libtomcrypt.so.1.0.1 /app/lib/libtomcrypt.so.1.0.1
      - ln -sf libtomcrypt.so.1.0.1 /app/lib/libtomcrypt.so.1
      - ln -sf libtomcrypt.so.1 /app/lib/libtomcrypt.so
      - mkdir -p /app/include
      - cp -r opt/firebird/include/* /app/include/
      - install -Dm644 firebirdConfig.cmake /app/lib/cmake/firebird/firebirdConfig.cmake
    sources:
      - type: archive
        # This tarball contains buildroot.tar.gz; strip-components: 1 places it at the root.
        url: https://github.com/FirebirdSQL/firebird/releases/download/v5.0.4/Firebird-5.0.4.1812-0-linux-x64.tar.gz
        sha256: ab6a15a0258f38b022be496bb5e038c14e8628ce9acd0f9a06288a3baedd917b
        strip-components: 1
      - type: file
        path: ../cmake/firebirdConfig.cmake
        dest: .

  - name: wxWidgets
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DwxBUILD_SHARED=ON
      - -DCMAKE_INSTALL_LIBDIR=lib
      - -DwxUSE_GTK3=ON
      - -DwxUSE_STC=ON
      - -DwxUSE_AUI=ON
      - -DwxUSE_WEBVIEW=ON
      - -DwxUSE_SECRETSTORE=ON
      - -DwxUSE_OPENGL=OFF
    sources:
      - type: archive
        url: https://github.com/wxWidgets/wxWidgets/releases/download/v3.2.6/wxWidgets-3.2.6.tar.bz2
        sha256: 939e5b77ddc5b6092d1d7d29491fe67010a2433cf9b9c0d841ee4d04acb9dce7

  - name: fb-cpp
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTING=OFF
      - -DFB_CPP_USE_BOOST_DLL=OFF
      - -DFB_CPP_USE_BOOST_MULTIPRECISION=OFF
      - -DENABLE_VCPKG=OFF
    sources:
      - type: dir
        path: ../src/fb-cpp
      - type: file
        path: ../cmake/firebirdConfig.cmake
        dest: cmake
      - type: dir
        path: ../src/firebird/include
        dest: src/firebird/include
      - type: patch
        path: ../ports/fb-cpp/fb-cpp-flamerobin.patch
      - type: shell
        commands:
          - rm -rf vcpkg vcpkg.json CMakePresets.json
          - sed -i '/set(VCPKG_ROOT/d' CMakeLists.txt
          - sed -i '/set(CMAKE_TOOLCHAIN_FILE/d' CMakeLists.txt
          - sed -i '1i set(firebird_DIR "${CMAKE_CURRENT_SOURCE_DIR}/cmake" CACHE PATH "" FORCE)' CMakeLists.txt
          - find . -name CMakeLists.txt -exec sed -i 's|fb-cpp/cmake|lib/cmake|g' {} +

  - name: nlohmann-json
    buildsystem: cmake-ninja
    config-opts:
      - -DJSON_BuildTests=OFF
    sources:
      - type: archive
        url: https://github.com/nlohmann/json/releases/download/v3.11.3/json.tar.xz
        sha256: d6c65aca6b1ed68e7a182f4757257b107ae403032760ed6ef121c9d55e81757d

  - name: flamerobin
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_VCPKG=OFF
      - -DFB_CPP_BUILD_TESTS=OFF
      - -Dfirebird_DIR=/app/lib/cmake/firebird
      - -Dfb-cpp_DIR=/app/lib/cmake/fb-cpp
      - -DCMAKE_PREFIX_PATH=/app
    sources:
      - type: dir
        path: ..
