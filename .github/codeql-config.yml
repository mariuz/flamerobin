name: "FlameRobin CodeQL config"

paths-ignore:
  - 'vcpkg/**'
  - 'Build/vcpkg_installed/**'
  - 'build/vcpkg_installed/**'
  - 'vcpkg_installed/**'

query-filters:
  - exclude:
      filepath:
        - "vcpkg/.*"
        - "Build/vcpkg_installed/.*"
        - "build/vcpkg_installed/.*"
        - "vcpkg_installed/.*"
