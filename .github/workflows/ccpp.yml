name: C/C++ CI

on:
  push:
    branches: [ master, dev ]
    tags: [ "v*" ]
  pull_request:
    branches: [ master, dev ]

jobs:
  build:
    name: Build FlameRobin
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    - name: apt update
      run: sudo apt-get update
    - name: Install tools and libs
      run: sudo apt-get install build-essential git cmake libnotify-dev libwxgtk3.2-dev libwxgtk-webview3.2-dev libicu-dev xvfb xdotool doxygen libboost-all-dev autoconf autoconf-archive automake libtool libx11-dev libxft-dev libxext-dev libwayland-dev libxkbcommon-dev libegl1-mesa-dev libibus-1.0-dev libdbus-1-dev libglib2.0-dev libatk1.0-dev gettext libxi-dev libxtst-dev libpango1.0-dev libcairo2-dev libgdk-pixbuf-2.0-dev libxrender-dev libxinerama-dev libxrandr-dev libxcursor-dev libxcomposite-dev libxdamage-dev libxfixes-dev libepoxy-dev libcups2-dev libfontconfig1-dev libwebkit2gtk-4.1-dev -y
    - name: Restore vcpkg binaries
      uses: actions/cache@v4
      with:
        path: vcpkg_archives
        key: ${{ runner.os }}-vcpkg-bin-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
            ${{ runner.os }}-vcpkg-bin-
    - name: Bootstrap vcpkg
      run: ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
    - name: Install dependencies (vcpkg)
      env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_archives
      run: |
        mkdir -p vcpkg_archives
        success=0
        for i in {1..3}; do
          ./vcpkg/vcpkg install && { success=1; break; }
          echo "vcpkg install failed, retrying in 10 seconds..."
          sleep 10
        done
        if [ $success -ne 1 ]; then
          echo "vcpkg install failed after 3 attempts"
          exit 1
        fi
    - name: Patch fb-cpp for aggregate initialization and optional vcpkg
      run: |
        perl -i -pe 's/\.emplace_back\(value, ([^)]+)\)/.push_back({value, $1})/g' src/fb-cpp/src/fb-cpp/BackupManager.h
        perl -i -0777 -pe 's/set\(VCPKG_ROOT "vcpkg"\)\nset\(CMAKE_TOOLCHAIN_FILE/option(ENABLE_VCPKG "Enable vcpkg" ON)\nif(ENABLE_VCPKG)\nset(VCPKG_ROOT "vcpkg")\nif(EXISTS "\${VCPKG_ROOT}\/scripts\/buildsystems\/vcpkg.cmake")\nset(CMAKE_TOOLCHAIN_FILE/g' src/fb-cpp/CMakeLists.txt
        perl -i -0777 -pe 's/(set\(CMAKE_TOOLCHAIN_FILE.*"\)\n)/$1endif()\nelse()\nif(CMAKE_TOOLCHAIN_FILE MATCHES "vcpkg.cmake\$")\nunset(CMAKE_TOOLCHAIN_FILE CACHE)\nunset(CMAKE_TOOLCHAIN_FILE)\nendif()\nendif()\n/g' src/fb-cpp/CMakeLists.txt
    - name: Download Firebird 5 client
      run: |
        wget -nv -O Firebird-5.0.4.1812-0-linux-x64.tar.gz \
            "https://github.com/FirebirdSQL/firebird/releases/download/v5.0.4/Firebird-5.0.4.1812-0-linux-x64.tar.gz"
        tar xzf Firebird-5.0.4.1812-0-linux-x64.tar.gz
        tar xzf Firebird-5.0.4.1812-0-linux-x64/buildroot.tar.gz -C Firebird-5.0.4.1812-0-linux-x64
        mkdir -p fb-client
        cp -P Firebird-5.0.4.1812-0-linux-x64/opt/firebird/lib/libfbclient.so* fb-client/
        cp -r Firebird-5.0.4.1812-0-linux-x64/opt/firebird/include fb-client/
        sudo mkdir -p /opt/firebird/lib /opt/firebird/include
        sudo cp -P fb-client/libfbclient.so* /opt/firebird/lib/
        sudo cp -r fb-client/include/. /opt/firebird/include/
        echo "/opt/firebird/lib" | sudo tee /etc/ld.so.conf.d/firebird.conf
        sudo ldconfig
    - name: CMake
      env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_archives
      run: |
          mkdir -p vcpkg_archives
          mkdir build
          cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=../vcpkg/scripts/buildsystems/vcpkg.cmake -DENABLE_VCPKG=ON -DBUILD_TESTING=OFF
    - name: Build
      run: make -j$(nproc)
      working-directory: ./build
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flamerobin-build
        path: |
          build/
          fb-client/
          !build/**/*.o
          !build/**/*.a
          !build/CMakeFiles/

  test:
    name: Test (Firebird ${{ matrix.firebird_version }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - firebird_version: "3"
            firebird_image_tag: "3"
            allow_failure: false
          - firebird_version: "4"
            firebird_image_tag: "4"
            allow_failure: false
          - firebird_version: "5"
            firebird_image_tag: "5"
            allow_failure: false
          - firebird_version: "6"
            firebird_image_tag: "6-snapshot"
            allow_failure: true
    continue-on-error: ${{ matrix.allow_failure }}
    runs-on: ubuntu-24.04
    services:
      firebird:
        image: firebirdsql/firebird:${{ matrix.firebird_image_tag }}
        ports:
          - 3050:3050
        env:
          FIREBIRD_USER: SYSDBA
          FIREBIRD_PASSWORD: masterkey
          FIREBIRD_ROOT_PASSWORD: masterkey

    steps:
    - uses: actions/checkout@v4
    - name: Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: flamerobin-build
    - name: Fix permissions
      run: chmod +x build/flamerobin build/*_test || true
    - name: apt update
      run: sudo apt-get update
    - name: Install tools and libs
      run: sudo apt-get install libnotify-dev libwxgtk3.2-dev libwxgtk-webview3.2-dev libicu-dev xvfb xdotool libboost-all-dev libx11-dev libxft-dev libxext-dev libwayland-dev libxkbcommon-dev libegl1-mesa-dev libglib2.0-dev libatk1.0-dev gettext libxi-dev libxtst-dev libpango1.0-dev libcairo2-dev libgdk-pixbuf-2.0-dev libxrender-dev libxinerama-dev libxrandr-dev libxcursor-dev libxcomposite-dev libxdamage-dev libxfixes-dev libepoxy-dev libcups2-dev libfontconfig1-dev libwebkit2gtk-4.1-dev -y
    - name: Install Firebird client
      run: |
        sudo mkdir -p /opt/firebird/lib /opt/firebird/include
        sudo cp -P fb-client/libfbclient.so* /opt/firebird/lib/
        sudo cp -r fb-client/include/. /opt/firebird/include/
        echo "/opt/firebird/lib" | sudo tee /etc/ld.so.conf.d/firebird.conf
        sudo ldconfig
    - name: Wait for Firebird service
      run: |
        for i in {1..60}; do
          if (echo > /dev/tcp/127.0.0.1/3050) >/dev/null 2>&1; then
            exit 0
          fi
          sleep 1
        done
        echo "Firebird service did not start in time."
        exit 1
    - name: Test
      env:
        IBPP_TEST_SERVER: localhost/3050
        LD_LIBRARY_PATH: /opt/firebird/lib
      run: ctest --output-on-failure --output-junit ctest-results.xml
      working-directory: ./build
    - name: Desktop smoke test
      env:
        LD_LIBRARY_PATH: /opt/firebird/lib
      run: |
        EXIT=0
        xvfb-run --auto-servernum timeout 5 ./flamerobin || EXIT=$?
        if [ "$EXIT" -ne 0 ] && [ "$EXIT" -ne 124 ] && [ "$EXIT" -ne 143 ]; then
          echo "flamerobin exited unexpectedly (code $EXIT) - possible startup crash"
          exit 1
        fi
        echo "Desktop smoke test passed (exit code $EXIT)"
      working-directory: ./build
    - name: UI automation test
      env:
        LD_LIBRARY_PATH: /opt/firebird/lib
      run: |
        xvfb-run --auto-servernum bash -c '
          ./flamerobin &
          APP_PID=$!
          FOUND=0
          WID=""
          for i in $(seq 1 30); do
            WID="$(xdotool search --name "FlameRobin" 2>/dev/null | head -n1 || true)"
            if [ -n "$WID" ]; then
              FOUND=1
              break
            fi
            WID="$(xdotool search --class "flamerobin" 2>/dev/null | head -n1 || true)"
            if [ -n "$WID" ]; then
              FOUND=1
              break
            fi
            sleep 1
          done
          if [ "$FOUND" -ne 1 ]; then
            echo "UI test: flamerobin window not found within 30 s"
            kill "$APP_PID" 2>/dev/null || true
            exit 1
          fi
          echo "UI test: window id $WID found"
          kill -TERM "$APP_PID" 2>/dev/null || true
          for i in $(seq 1 10); do
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              break
            fi
            sleep 1
          done
          kill -9 "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" 2>/dev/null || true
          APP_EXIT=$?
          echo "UI automation test passed (flamerobin exit code $APP_EXIT)"
        '
      working-directory: ./build
    - name: Publish test report
      if: always() && github.event_name != 'pull_request'
      uses: mikepenz/action-junit-report@v5
      with:
        report_paths: ./build/ctest-results.xml
        check_name: Google Test Results (FB ${{ matrix.firebird_version }})
