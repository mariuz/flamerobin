name: C/C++ CI

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

jobs:
  build:

    #runs-on: ubuntu-latest
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: apt update
      run: sudo apt-get update
    - name: Install tools and libs
      run: sudo apt-get install build-essential git cmake firebird-dev libnotify-dev libwxgtk3.2-dev -y
    - name: CMake
      run: |
          mkdir build
          cd build
          cmake ..
    - name: Build
      run: make
      working-directory: ./build
    - name: Test
      run: ctest --output-on-failure --output-junit ctest-results.xml
      working-directory: ./build
    - name: Publish test report
      if: always()
      uses: mikepenz/action-junit-report@v5
      with:
        report_paths: ./build/ctest-results.xml
        check_name: Google Test Results
