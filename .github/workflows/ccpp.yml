name: C/C++ CI

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

jobs:
  build:
    name: Build and test (Firebird ${{ matrix.firebird_version }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - firebird_version: "3"
            firebird_image_tag: "3"
            allow_failure: false
          - firebird_version: "4"
            firebird_image_tag: "4"
            allow_failure: false
          - firebird_version: "5"
            firebird_image_tag: "5"
            allow_failure: false
          - firebird_version: "6"
            # Firebird 6 Docker tags are not yet available in the official image.
            # Keep this matrix entry in place and run it against latest for now.
            firebird_image_tag: "latest"
            allow_failure: true
    continue-on-error: ${{ matrix.allow_failure }}

    #runs-on: ubuntu-latest
    runs-on: ubuntu-24.04
    services:
      firebird:
        image: firebirdsql/firebird:${{ matrix.firebird_image_tag }}
        ports:
          - 3050:3050
        env:
          FIREBIRD_USER: SYSDBA
          FIREBIRD_PASSWORD: masterkey
          FIREBIRD_ROOT_PASSWORD: masterkey

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: apt update
      run: sudo apt-get update
    - name: Install tools and libs
      run: sudo apt-get install build-essential git cmake firebird-dev libnotify-dev libwxgtk3.2-dev -y
    - name: CMake
      run: |
          mkdir build
          cd build
          cmake ..
    - name: Build
      run: make
      working-directory: ./build
    - name: Wait for Firebird service
      run: |
        for i in {1..60}; do
          if (echo > /dev/tcp/127.0.0.1/3050) >/dev/null 2>&1; then
            exit 0
          fi
          sleep 1
        done
        echo "Firebird service did not start in time."
        exit 1
    - name: Test
      env:
        IBPP_TEST_SERVER: localhost/3050
      run: ctest --output-on-failure --output-junit ctest-results.xml
      working-directory: ./build
    - name: Publish test report
      if: always()
      uses: mikepenz/action-junit-report@v5
      with:
        report_paths: ./build/ctest-results.xml
        check_name: Google Test Results
