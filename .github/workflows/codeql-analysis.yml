# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
#
# ******** NOTE ********
# We have attempted to detect the languages in your repository. Please check
# the `language` matrix defined below to confirm you have the correct set of
# supported CodeQL languages.
#
name: "CodeQL"

on:
  push:
    branches: [ master ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ master ]
  schedule:
    - cron: '36 12 * * 4'

jobs:
  analyze:
    name: Analyze
    #runs-on: ubuntu-latest
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp' ]
        # CodeQL supports [ 'cpp', 'csharp', 'go', 'java', 'javascript', 'python' ]
        # Learn more:
        # https://docs.github.com/en/free-pro-team@latest/github/finding-security-vulnerabilities-and-errors-in-your-code/configuring-code-scanning#changing-the-languages-that-are-analyzed

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # If you wish to specify custom queries, you can do so here or in a config file.
        # By default, queries listed here will override any specified in a config file.
        # Prefix the list here with "+" to use these queries and those in the config file.
        # queries: ./path/to/local/query, your-org/your-repo/queries@main
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git cmake libnotify-dev libwxgtk3.2-dev libwxgtk-webview3.2-dev libicu-dev xvfb xdotool doxygen libboost-all-dev autoconf autoconf-archive automake libtool libx11-dev libxft-dev libxext-dev libwayland-dev libxkbcommon-dev libegl1-mesa-dev libibus-1.0-dev libdbus-1-dev libglib2.0-dev libatk1.0-dev gettext libxi-dev libxtst-dev libpango1.0-dev libcairo2-dev libgdk-pixbuf-2.0-dev libxrender-dev libxinerama-dev libxrandr-dev libxcursor-dev libxcomposite-dev libxdamage-dev libxfixes-dev libepoxy-dev libcups2-dev libfontconfig1-dev ninja-build libwebkit2gtk-4.1-dev
        sudo ldconfig

    - name: Cache vcpkg binaries
      uses: actions/cache@v4
      with:
        path: vcpkg_archives
        key: ${{ runner.os }}-vcpkg-bin-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
            ${{ runner.os }}-vcpkg-bin-

    - name: Bootstrap vcpkg
      run: ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

    - name: Install dependencies (vcpkg)
      env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_archives
      run: |
        mkdir -p vcpkg_archives
        success=0
        for i in {1..3}; do
          ./vcpkg/vcpkg install && { success=1; break; }
          echo "vcpkg install failed, retrying in 10 seconds..."
          sleep 10
        done
        if [ $success -ne 1 ]; then
          echo "vcpkg install failed after 3 attempts"
          exit 1
        fi

    - name: Download Firebird 5 client
      run: |
        wget -nv -O Firebird-5.0.4.1812-0-linux-x64.tar.gz \
            "https://github.com/FirebirdSQL/firebird/releases/download/v5.0.4/Firebird-5.0.4.1812-0-linux-x64.tar.gz"
        tar xzf Firebird-5.0.4.1812-0-linux-x64.tar.gz
        tar xzf Firebird-5.0.4.1812-0-linux-x64/buildroot.tar.gz -C Firebird-5.0.4.1812-0-linux-x64
        mkdir -p fb-client
        cp -P Firebird-5.0.4.1812-0-linux-x64/opt/firebird/lib/libfbclient.so* fb-client/
        cp -r Firebird-5.0.4.1812-0-linux-x64/opt/firebird/include fb-client/
        cp -r Firebird-5.0.4.1812-0-linux-x64/opt/firebird/plugins fb-client/
        sudo mkdir -p /opt/firebird/lib /opt/firebird/include /opt/firebird/plugins
        sudo cp -P fb-client/libfbclient.so* /opt/firebird/lib/
        sudo cp -r fb-client/include/. /opt/firebird/include/
        sudo cp -r fb-client/plugins/. /opt/firebird/plugins/
        echo "/opt/firebird/lib" | sudo tee /etc/ld.so.conf.d/firebird.conf
        sudo ldconfig

    - name: Configure CMake
      env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_archives
      run: |
        cmake -G Ninja -S . -B Build -DCMAKE_TOOLCHAIN_FILE=vcpkg/scripts/buildsystems/vcpkg.cmake -DENABLE_VCPKG=ON -DFB_CPP_BUILD_TESTS=OFF

    - name: Build
      run: cmake --build Build -j $(nproc)

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
