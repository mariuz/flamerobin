name: Build Flamerobin for Windows

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86
            cmake_arch: Win32
            msbuild_platform: Win32
            setup_script: FlameRobinSetup.iss
            artifact_name: flamerobin-installer-x86
            build_dir: build32
          - arch: x64
            cmake_arch: x64
            msbuild_platform: x64
            setup_script: FlameRobinSetup64.iss
            artifact_name: flamerobin-installer-x64
            build_dir: build64

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.arch }}

    - name: Get VS Path
      id: vs
      shell: pwsh
      run: |
        $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
        if (-not $vsPath) {
            Write-Error "Visual Studio installation not found"
            exit 1
        }
        $toolsPath = (Join-Path $vsPath "Common7\Tools")
        if (-not (Test-Path $toolsPath)) {
            Write-Error "Tools path not found: $toolsPath"
            exit 1
        }
        # Many legacy scripts expect the trailing backslash
        $toolsPathWithBackslash = $toolsPath + "\"
        Write-Host "Found VS Tools at: $toolsPathWithBackslash"
        "tools_path=$toolsPathWithBackslash" | Add-Content -Path $env:GITHUB_OUTPUT
        
        # Set for global use in subsequent steps
        "VS170COMNTOOLS=$toolsPathWithBackslash" | Add-Content -Path $env:GITHUB_ENV
        "VS160COMNTOOLS=$toolsPathWithBackslash" | Add-Content -Path $env:GITHUB_ENV
        "VS150COMNTOOLS=$toolsPathWithBackslash" | Add-Content -Path $env:GITHUB_ENV
        "VS140COMNTOOLS=$toolsPathWithBackslash" | Add-Content -Path $env:GITHUB_ENV
    
    - name: Bootstrap vcpkg
      run: .\vcpkg\bootstrap-vcpkg.bat -disableMetrics
    
    - name: Cache vcpkg binaries
      uses: actions/cache@v4
      with:
        path: vcpkg_archives
        key: ${{ runner.os }}-vcpkg-bin-${{ matrix.arch }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
            ${{ runner.os }}-vcpkg-bin-${{ matrix.arch }}-
    
    - name: Install dependencies (vcpkg)
      env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg_archives
        VS170COMNTOOLS: ${{ steps.vs.outputs.tools_path }}
        VS160COMNTOOLS: ${{ steps.vs.outputs.tools_path }}
        VS150COMNTOOLS: ${{ steps.vs.outputs.tools_path }}
        VS140COMNTOOLS: ${{ steps.vs.outputs.tools_path }}
        VCPKG_KEEP_ENV_VARS: VS170COMNTOOLS;VS160COMNTOOLS;VS150COMNTOOLS;VS140COMNTOOLS
      run: |
        if (!(Test-Path vcpkg_archives)) { New-Item -ItemType Directory -Path vcpkg_archives }
        $success = $false
        for ($i = 1; $i -le 3; $i++) {
          & .\vcpkg\vcpkg.exe install --triplet ${{ matrix.arch }}-windows-static
          if ($LASTEXITCODE -eq 0) {
            $success = $true
            break
          }
          Write-Host "vcpkg install failed, retrying in 10 seconds..."
          Start-Sleep -Seconds 10
        }
        if (-not $success) {
          Write-Error "vcpkg install failed after 3 attempts"
          exit 1
        }

    - name: Generate CMake project
      env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg_archives
      run: |
        if (!(Test-Path vcpkg_archives)) { New-Item -ItemType Directory -Path vcpkg_archives }
        cmake -S .\ -B .\${{ matrix.build_dir }} -A ${{ matrix.cmake_arch }} "-DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=${{ matrix.arch }}-windows-static -DVCPKG_INSTALLED_DIR="${{ github.workspace }}\vcpkg_installed"
      
    - name: Build Flamerobin
      run: >
        cmake --build .\${{ matrix.build_dir }} --config Release -j 8

    - name: Innosetup 
      run: >
        ISCC.exe install\win32\${{ matrix.setup_script }}

    - name: Upload installer
      uses: actions/upload-artifact@v4
      with:
          name: ${{ matrix.artifact_name }}
          path: install/win32/output/flamerobin-*.exe
