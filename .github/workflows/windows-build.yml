name: Build Flamerobin for Windows

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86
            cmake_arch: Win32
            msbuild_platform: Win32
            setup_script: FlameRobinSetup.iss
            artifact_name: flamerobin-installer-x86
            build_dir: build32
          - arch: x64
            cmake_arch: x64
            msbuild_platform: x64
            setup_script: FlameRobinSetup64.iss
            artifact_name: flamerobin-installer-x64
            build_dir: build64

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.arch }}

    - name: Get VS Path
      id: vs
      shell: pwsh
      run: |
        $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -version "[17.0,18.0)" -latest -property installationPath
        if (-not $vsPath) {
            $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
        }
        if (-not $vsPath) {
            Write-Error "Visual Studio installation not found"
            exit 1
        }
        $toolsPath = (Join-Path $vsPath "Common7\Tools")
        if (-not (Test-Path $toolsPath)) {
            Write-Error "Tools path not found: $toolsPath"
            exit 1
        }
        $toolsPathWithBackslash = $toolsPath + "\"
        Write-Host "Found VS Tools at: $toolsPathWithBackslash"
        echo "tools_path=$toolsPathWithBackslash" >> $env:GITHUB_OUTPUT
        
        # Set for global use in subsequent steps
        echo "VS170COMNTOOLS=$toolsPathWithBackslash" >> $env:GITHUB_ENV
    
    - name: Bootstrap vcpkg
      run: |
        .\vcpkg\bootstrap-vcpkg.bat -disableMetrics
        echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $env:GITHUB_ENV
    
    - name: Cache vcpkg binaries
      uses: actions/cache@v4
      with:
        path: vcpkg_archives
        key: ${{ runner.os }}-vcpkg-bin-${{ matrix.arch }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
            ${{ runner.os }}-vcpkg-bin-${{ matrix.arch }}-
    
    - name: Install dependencies (vcpkg)
      env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg_archives
        VS170COMNTOOLS: ${{ steps.vs.outputs.tools_path }}
        VCPKG_KEEP_ENV_VARS: VS170COMNTOOLS
        VCPKG_MAX_CONCURRENCY: 1
      run: |
        if (!(Test-Path vcpkg_archives)) { New-Item -ItemType Directory -Path vcpkg_archives }
        $success = $false
        for ($i = 1; $i -le 3; $i++) {
          & .\vcpkg\vcpkg.exe install --triplet ${{ matrix.arch }}-windows-static
          if ($LASTEXITCODE -eq 0) {
            $success = $true
            break
          }
          Write-Host "vcpkg install failed, retrying in 10 seconds..."
          Start-Sleep -Seconds 10
        }
        if (-not $success) {
          Write-Error "vcpkg install failed after 3 attempts"
          exit 1
        }

    - name: Show vcpkg logs on failure
      if: failure()
      shell: pwsh
      run: |
        $logDir = "vcpkg/buildtrees"
        if (Test-Path $logDir) {
          Get-ChildItem -Path $logDir -Filter "*.log" -Recurse | ForEach-Object {
            Write-Host "--- CONTENT OF $($_.FullName) ---"
            Get-Content $_.FullName -Tail 200
          }
        }

    - name: Generate CMake project
      env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg_archives
      run: |
        if (!(Test-Path vcpkg_archives)) { New-Item -ItemType Directory -Path vcpkg_archives }
        cmake -S .\ -B .\${{ matrix.build_dir }} -A ${{ matrix.cmake_arch }} "-DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=${{ matrix.arch }}-windows-static -DVCPKG_INSTALLED_DIR="${{ github.workspace }}\vcpkg_installed" -DCMAKE_VERBOSE_MAKEFILE=ON
      
    - name: Build Flamerobin
      run: >
        cmake --build .\${{ matrix.build_dir }} --config Release --target flamerobin -j 8 --verbose

    - name: Download and Extract Firebird Client
      shell: pwsh
      run: |
        $arch = "${{ matrix.arch }}"
        $fbArch = if ($arch -eq "x86") { "x86" } else { "x64" }
        $fbUrl = "https://github.com/FirebirdSQL/firebird/releases/download/v5.0.4/Firebird-5.0.4.1812-0-windows-$fbArch.zip"
        $fbZip = "firebird-$arch.zip"
        $fbExtractDir = "firebird-$arch-extracted"
        
        # Download Firebird client ZIP
        Write-Host "Downloading Firebird client from $fbUrl ..."
        [System.Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        Invoke-WebRequest -Uri $fbUrl -OutFile $fbZip
        
        # Extract Firebird client ZIP
        Write-Host "Extracting Firebird client ZIP ..."
        Expand-Archive -Path $fbZip -DestinationPath $fbExtractDir -Force
        
        # Force the embedded engine to use shared lock files (ServerMode = SuperClassic)
        $confPath = "$fbExtractDir\firebird.conf"
        if (Test-Path $confPath) {
            $confContent = Get-Content $confPath
            if ($confContent -match 'ServerMode') {
                $confContent = $confContent -replace '^#?\s*ServerMode\s*=\s*\w+', 'ServerMode = SuperClassic'
            } else {
                $confContent += "`nServerMode = SuperClassic"
            }
            $confContent | Set-Content $confPath
        }

    - name: Build MSI Installer
      shell: pwsh
      run: |
        dotnet build install/win32/FlameRobin.wixproj -c Release -p:Platform=${{ matrix.arch }} -p:FlameRobinExeSource=..\..\${{ matrix.build_dir }}\Release\flamerobin.exe -p:FirebirdClientDir=..\..\firebird-${{ matrix.arch }}-extracted
        $versionFile = Get-Content src/frversion.h -Raw
        $major = [regex]::Match($versionFile, '#define\s+FR_VERSION_MAJOR\s+(\d+)').Groups[1].Value
        $minor = [regex]::Match($versionFile, '#define\s+FR_VERSION_MINOR\s+(\d+)').Groups[1].Value
        $rls = [regex]::Match($versionFile, '#define\s+FR_VERSION_RLS\s+(\d+)').Groups[1].Value
        $version = "${major}.${minor}.${rls}"
        Copy-Item -Path "install/win32/bin/${{ matrix.arch }}/Release/FlameRobin.msi" -Destination "install/win32/bin/${{ matrix.arch }}/Release/FlameRobin-$version-${{ matrix.arch }}.msi" -Force

    - name: Build Portable Release
      shell: pwsh
      run: |
        $versionFile = Get-Content src/frversion.h -Raw
        $major = [regex]::Match($versionFile, '#define\s+FR_VERSION_MAJOR\s+(\d+)').Groups[1].Value
        $minor = [regex]::Match($versionFile, '#define\s+FR_VERSION_MINOR\s+(\d+)').Groups[1].Value
        $rls = [regex]::Match($versionFile, '#define\s+FR_VERSION_RLS\s+(\d+)').Groups[1].Value
        $version = "${major}.${minor}.${rls}"
        
        $arch = "${{ matrix.arch }}"
        $buildDir = "${{ matrix.build_dir }}"
        $fbExtractDir = "firebird-$arch-extracted"
        
        # Create portable staging directory
        $stagingDir = "flamerobin-portable-$version-$arch"
        if (Test-Path $stagingDir) { Remove-Item -Path $stagingDir -Recurse -Force }
        New-Item -ItemType Directory -Path $stagingDir -Force
        
        # Copy Flamerobin executable
        Copy-Item -Path "$buildDir\Release\flamerobin.exe" -Destination "$stagingDir\" -Force
        
        # Copy resources
        $assets = @("docs", "conf-defs", "code-templates", "html-templates", "sys-templates", "xml-styles")
        foreach ($asset in $assets) {
            if (Test-Path $asset) {
                Copy-Item -Path $asset -Destination "$stagingDir\" -Recurse -Force
            }
        }
        
        # Copy images (icons)
        $imagesDir = Join-Path $stagingDir "images"
        New-Item -ItemType Directory -Path $imagesDir -Force
        Copy-Item -Path "$buildDir\images\*" -Destination "$imagesDir\" -Recurse -Force
        
        # Copy Firebird client DLLs and config
        Copy-Item -Path "$fbExtractDir\fbclient.dll" -Destination "$stagingDir\" -Force
        Copy-Item -Path "$fbExtractDir\ib_util.dll" -Destination "$stagingDir\" -Force
        Copy-Item -Path "$fbExtractDir\firebird.conf" -Destination "$stagingDir\" -Force

        # Copy ICU files
        Get-ChildItem -Path $fbExtractDir -Filter "icu*.dll" | Copy-Item -Destination "$stagingDir\" -Force
        Get-ChildItem -Path $fbExtractDir -Filter "icu*.dat" | Copy-Item -Destination "$stagingDir\" -Force
        
        # Plugins directory
        $pluginsDir = Join-Path $stagingDir "plugins"
        New-Item -ItemType Directory -Path $pluginsDir -Force
        Copy-Item -Path "$fbExtractDir\plugins\srp.dll" -Destination "$pluginsDir\" -Force
        Copy-Item -Path "$fbExtractDir\plugins\legacy_auth.dll" -Destination "$pluginsDir\" -Force
        Copy-Item -Path "$fbExtractDir\plugins\legacy_usermanager.dll" -Destination "$pluginsDir\" -Force
        
        # Intl directory
        $intlDir = Join-Path $stagingDir "intl"
        New-Item -ItemType Directory -Path $intlDir -Force
        Copy-Item -Path "$fbExtractDir\intl\fbintl.dll" -Destination "$intlDir\" -Force
        Copy-Item -Path "$fbExtractDir\intl\fbintl.conf" -Destination "$intlDir\" -Force
        
        # Compress to Zip
        $zipPath = "flamerobin-portable-$version-$arch.zip"
        if (Test-Path $zipPath) { Remove-Item -Path $zipPath -Force }
        Compress-Archive -Path "$stagingDir" -DestinationPath $zipPath -Force
        
        Write-Host "Portable package created successfully at $zipPath"

    - name: Upload installer
      uses: actions/upload-artifact@v4
      with:
          name: ${{ matrix.artifact_name }}
          path: install/win32/bin/${{ matrix.arch }}/Release/FlameRobin-*.msi

    - name: Upload portable ZIP
      uses: actions/upload-artifact@v4
      with:
          name: flamerobin-portable-${{ matrix.arch }}
          path: flamerobin-portable-*.zip

