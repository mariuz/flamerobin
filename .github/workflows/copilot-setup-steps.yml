name: "Copilot Setup Steps"

# Run automatically when this file changes, and allow manual runs.
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml


jobs:
    # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # Install system packages required to build FlameRobin
            - name: Install build dependencies
              run: |
                sudo apt-get update
                sudo apt-get install -y \
                  build-essential \
                  cmake \
                  libwxgtk3.2-dev \
                  libfbclient2 \
                  firebird3.0-server \
                  firebird3.0-utils \
                  firebird-dev \
                  firebird3.0-server-core \
                  firebird3.0-common
                sudo ldconfig
