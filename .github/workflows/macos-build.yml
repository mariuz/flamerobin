name: Build FlameRobin for macOS

env:
  fb-tag: v5.0.3
  fb-build: 5.0.3.1683-0

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: read
    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Bootstrap vcpkg
      run: ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

    - name: Patch fb-cpp for macOS aggregate initialization and optional vcpkg
      run: |
        perl -i -pe 's/\.emplace_back\(value, ([^)]+)\)/.push_back({value, $1})/g' src/fb-cpp/src/fb-cpp/BackupManager.h
        perl -i -0777 -pe 's/set\(VCPKG_ROOT "vcpkg"\)\nset\(CMAKE_TOOLCHAIN_FILE/option(ENABLE_VCPKG "Enable vcpkg" ON)\nif(ENABLE_VCPKG)\nset(VCPKG_ROOT "vcpkg")\nif(EXISTS "\${VCPKG_ROOT}\/scripts\/buildsystems\/vcpkg.cmake")\nset(CMAKE_TOOLCHAIN_FILE/g' src/fb-cpp/CMakeLists.txt
        perl -i -0777 -pe 's/(set\(CMAKE_TOOLCHAIN_FILE.*"\)\n)/$1endif()\nelse()\nif(CMAKE_TOOLCHAIN_FILE MATCHES "vcpkg.cmake\$")\nunset(CMAKE_TOOLCHAIN_FILE CACHE)\nunset(CMAKE_TOOLCHAIN_FILE)\nendif()\nendif()\n/g' src/fb-cpp/CMakeLists.txt

    - name: Cache vcpkg binaries
      uses: actions/cache@v4
      with:
        path: vcpkg_archives
        key: ${{ runner.os }}-vcpkg-bin-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
            ${{ runner.os }}-vcpkg-bin-

    # Install wxWidgets via Homebrew (avoids building from source with cmake 4.0+
    # which is incompatible with wxWidgets 3.2.x cmake_minimum_required VERSION)
    - name: Install dependencies
      run: brew install wxwidgets autoconf automake libtool boost icu4c

    # Install Firebird
    - name: Install Firebird
      run: |
        wget -nv -O Firebird-macOS.pkg \
            "https://github.com/FirebirdSQL/firebird/releases/download/${{ env.fb-tag }}/Firebird-${{ env.fb-build }}-macos-arm64.pkg"
        sudo installer -pkg Firebird-macOS.pkg -target /

    # Building the CMake project for FlameRobin
    - name: Generate CMake project
      env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_archives
      run: |
        mkdir -p vcpkg_archives
        cmake -S . -B Build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/Applications \
              -DCMAKE_PREFIX_PATH="$(brew --prefix);$(brew --prefix icu4c)" -DENABLE_VCPKG=OFF

    # FlameRobin Compilation
    - name: Build FlameRobin
      run: |
        cmake --build Build --config Release -j$(sysctl -n hw.ncpu)

    # Check where the generated app bundle is
    - name: Locate the compiled app bundle
      run: |
        find Build/ -name "flamerobin.app" -type d
        du -skh Build/flamerobin.app

    # Set the version of the flamerobin program
    - name: Set the version of the FlameRobin program
      run: |
        FLAMEROBIN_VERSION=$(awk '
          /FR_VERSION_MAJOR/ { major = $3 }
          /FR_VERSION_MINOR/ { minor = $3 }
          /FR_VERSION_RLS/   { rls   = $3 }
          END { print major "." minor "." rls }
          ' src/frversion.h)
        echo "flamerobin version : $FLAMEROBIN_VERSION"
        echo "FLAMEROBIN_VERSION=$FLAMEROBIN_VERSION" >> $GITHUB_ENV

    # Upload the app bundle as a GitHub Actions artifact
    - name: Upload macOS app bundle
      uses: actions/upload-artifact@v4
      with:
        name: flamerobin-macos-${{ env.FLAMEROBIN_VERSION }}
        path: Build/flamerobin.app
